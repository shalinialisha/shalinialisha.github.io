<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shali Pedia - The Personal Encyclopedia</title>
  <link rel="stylesheet" href="css/wikipedia.css">
</head>
<body>

  <!-- LEFT SIDEBAR (rendered by engine.js) -->
  <div id="mw-panel" class="sidebar"></div>

  <!-- MAIN CONTENT AREA -->
  <div id="content" class="mw-body">

    <!-- WELCOME HEADER -->
    <div id="mp-welcome">
      <h1 id="firstHeading" class="firstHeading">Welcome to <span style="font-variant: small-caps;">Shali Pedia</span></h1>
      <div id="siteSub">the personal encyclopedia that anyone can explore</div>
    </div>

    <!-- PORTAL BOXES (auto-generated by JS below) -->
    <div id="mp-portals"></div>

    <!-- STATISTICS -->
    <div id="mp-stats"></div>

  </div>

  <script src="js/registry.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/search.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var portalsContainer = document.getElementById('mp-portals');
      var grouped = SHALIpedia.getHomepagePages();

      // Two-column layout: left column categories, then right column
      // Wikipedia alternates: left-right-left-right
      var categoryOrder = [
        'Research Experience',
        'Professional Experience',
        'Personal Projects',
        'Skills & Qualifications',
        'Community'
      ];

      categoryOrder.forEach(function(category, index) {
        var pages = grouped[category];
        if (!pages || pages.length === 0) return;

        var portal = document.createElement('div');
        portal.className = 'mw-portal';

        // Community spans full width at bottom
        if (category === 'Community') {
          portal.classList.add('mw-portal-full');
        }

        var heading = document.createElement('h2');
        heading.textContent = category;
        portal.appendChild(heading);

        var list = document.createElement('ul');
        pages.forEach(function(page) {
          var li = document.createElement('li');
          var link = document.createElement('a');
          link.href = page.path;
          link.textContent = page.title;
          li.appendChild(link);
          if (page.description) {
            var desc = document.createElement('span');
            desc.className = 'portal-desc';
            desc.textContent = ' — ' + page.description;
            li.appendChild(desc);
          }
          list.appendChild(li);
        });
        portal.appendChild(list);

        portalsContainer.appendChild(portal);
      });

      // Statistics
      var statsEl = document.getElementById('mp-stats');
      var totalPages = SHALIpedia.getAllPageIds().length;
      statsEl.textContent = 'Shali Pedia contains ' + totalPages + ' articles across ' +
        (SHALIpedia.getCategories().length) + ' categories.';
    });
  </script>
</body>
</html>
